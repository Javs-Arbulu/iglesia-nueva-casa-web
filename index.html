<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iglesia Nueva Casa | Lima, Perú</title>

    <!-- Modo oscuro: aplica el tema antes de pintar para evitar el "flash" -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('theme')
          if (
            t === 'dark' ||
            (!t &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>

    <!-- Preconnect para recursos externos -->
    <link rel="preconnect" href="https://maps.googleapis.com" />
    <link
      rel="preconnect"
      href="https://maps.gstatic.com"
      crossorigin="anonymous"
    />

    <!-- JSON-LD: Datos estructurados de la iglesia -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Church",
        "name": "Iglesia Nueva Casa",
        "url": "https://nuevacasa.pe",
        "logo": "https://nuevacasa.pe/favicon.png",
        "description": "Comunidad cristiana en San Martín de Porres, Lima. Nos reunimos cada domingo para adorar, crecer y servir juntos.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Jr. Juan Luis Hague 3545",
          "addressLocality": "San Martín de Porres",
          "addressRegion": "Lima",
          "postalCode": "15102",
          "addressCountry": "PE"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": -12.023918,
          "longitude": -77.083632
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Sunday",
            "opens": "11:00",
            "closes": "13:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Saturday",
            "opens": "17:00",
            "closes": "19:00"
          }
        ],
        "sameAs": [
          "https://www.instagram.com/iglesianuevacasa/",
          "https://www.youtube.com/@iglesianuevacasa",
          "https://www.facebook.com/IglesiaNuevaCasa"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
